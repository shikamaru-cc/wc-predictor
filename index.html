<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>世界杯数据解读</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f4ed;
      display: flex;
      justify-content: center;
      padding: 16px 12px;
    }
    .list { width: 100%; max-width: 375px; }

    /* Header */
    .hd {
      background: #faf9f5;
      border-radius: 14px;
      padding: 18px 16px 14px;
      margin-bottom: 10px;
      border: 1px solid #f0eee6;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .hd-left h1 { font-family: Georgia, serif; font-size: 22px; font-weight: 500; color: #141413; line-height: 1.2; }
    .hd-left .sub { font-size: 10px; color: #87867f; margin-top: 2px; }
    .hd-right { text-align: right; }
    .hd-right .date { font-size: 14px; font-weight: 500; color: #c96442; }
    .hd-right .info { font-size: 10px; color: #87867f; }

    .disc { background:#f5f4ed; border-radius:8px; padding:6px 10px; margin-bottom:10px; border:1px solid #e8e6dc; }
    .disc p { font-size:9px; color:#5e5d59; line-height:1.4; }

    /* Section label */
    .sec { display:flex; align-items:center; gap:6px; margin-bottom:8px; }
    .sec span { font-family:Georgia,serif; font-size:15px; font-weight:500; color:#141413; }
    .sec::after { content:''; flex:1; height:1px; background:#e8e6dc; }

    /* List item - clickable */
    .item {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #faf9f5;
      border-radius: 12px;
      padding: 10px 12px;
      margin-bottom: 5px;
      border: 1px solid #f0eee6;
      text-decoration: none;
      transition: all 0.1s;
    }
    .item:active { background: #f0eee6; transform: scale(0.98); }
    .item.featured { border-color: #c96442; border-width: 1.5px; }

    .item-time { font-size: 10px; color: #87867f; min-width: 28px; font-weight: 500; }
    .item-group { font-size: 8px; color: #87867f; background: #e8e6dc; padding: 0 5px; border-radius: 3px; min-width: 16px; text-align: center; }
    .item-teams { flex: 1; display: flex; align-items: center; gap: 3px; min-width: 0; }
    .item-fl { font-size: 16px; }
    .item-n { font-size: 12px; color: #141413; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-n.sm { color: #5e5d59; }
    .item-v { font-size: 8px; color: #d1cfc5; flex-shrink: 0; }
    .item-arrow { font-size: 14px; color: #d1cfc5; flex-shrink: 0; }

    .item-tag { font-size: 7px; padding: 1px 5px; border-radius: 3px; font-weight: 500; }
    .item-tag.f { background: #c96442; color: #faf9f5; }
    .item-tag.p { background: #141413; color: #b0aea5; }

    .nd { display:flex; align-items:center; gap:6px; margin:4px 0; color:#87867f; font-size:8px; font-weight:500; text-transform:uppercase; letter-spacing:0.3px; }
    .nd::after { content:''; flex:1; height:1px; background:#f0eee6; }

    .ft {
      margin-top: 8px;
      padding: 8px 14px;
      background: #faf9f5;
      border-radius: 12px;
      border: 1px solid #f0eee6;
      display: flex;
      justify-content: space-between;
    }
    .ft span { font-size: 8px; color: #87867f; }
  </style>
</head>
<body>
<div class="list">

  <div class="hd">

      <span class="item-v">vs</span>

    <span class="item-tag p">关注</span>
    <span class="item-arrow">›</span>

  <a class="item" href="match/ivorycoast-ecuador.html">

<script>document.getElementById('cur-date').textContent=(new Date().getMonth()+1)+'/'+new Date().getDate();</script>
</body>
</html>
